<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSA Portal de Operaciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Ocultamos todo por defecto */
        #main-content { display: none; }
        body { background: #0a1628; color: white; font-family: 'Barlow', sans-serif; margin: 0; }
        .lock-screen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; text-align: center; background: #0a1628;
        }
        .btn-retry { 
            margin-top: 20px; padding: 10px 20px; background: #1a3a8c; color: white; 
            border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase;
        }
        /* Estilos de tus cards y layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: 3rem; text-transform: uppercase; }
        .t2 { color: #00b4d8; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; margin-top: 20px; }
        .btn-pri { background: #00b4d8; color: #0a1628; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: 600; display: inline-block; }
    </style>
</head>
<body>

    <div id="access-screen" class="lock-screen">
        <h1 id="status-msg" style="color:#00b4d8">VALIDANDO ACCESO...</h1>
        <button id="retry-btn" class="btn-retry" style="display:none;" onclick="location.reload()">Reintentar</button>
    </div>

    <div id="main-content" class="container">
        <h1 class="hero-title">OPERACIONES <span class="t2">MSA</span></h1>
        <div class="card">
            <h2>Próximas Operaciones</h2>
            <p>Control de ETAs y Muelles.</p><br>
            <a href="operaciones.html" class="btn-pri">ENTRAR</a>
        </div>
        </div>

    <script>
        // Función de validación simple (Sin hashes complejos para asegurar compatibilidad total)
        function validar() {
            const USER_OK = "ISA";
            const PASS_OK = "Palmira8025";

            const user = prompt("Usuario:");
            const pass = prompt("Clave:");

            if (user === USER_OK && pass === PASS_OK) {
                // Éxito: Ocultamos el bloqueo y mostramos el contenido
                document.getElementById('access-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                // Fallo
                document.getElementById('status-msg').innerText = "ACCESO DENEGADO";
                document.getElementById('status-msg').style.color = "#ef4444";
                document.getElementById('retry-btn').style.display = "block";
            }
        }

        // Ejecutamos la validación apenas carga la ventana
        window.onload = validar;
    </script>

</body>
</html>
