<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISA - Procesador Operativo Estricto</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #003366; --gold: #c5a059; --red: #d32f2f; --bg: #f5f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--blue); border-left: 5px solid var(--gold); padding-left: 15px; margin-bottom: 25px; font-size: 24px; }
        textarea { width: 100%; height: 180px; border: 2px solid #ddd; border-radius: 8px; padding: 15px; font-family: 'Courier New', monospace; font-size: 13px; resize: vertical; box-sizing: border-box; }
        .controls { margin: 25px 0; display: flex; gap: 15px; }
        .btn { padding: 12px 28px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn-process { background: var(--blue); color: white; }
        .btn-export { background: #2e7d32; color: white; display: none; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .alert-box { padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none; font-weight: 500; }
        .alert-warn { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }

        .table-container { overflow-x: auto; margin-top: 20px; border-radius: 8px; border: 1px solid #dee2e6; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: var(--blue); color: white; padding: 12px; text-align: center; font-size: 11px; letter-spacing: 1px; }
        td { border: 1px solid #dee2e6; padding: 10px; text-align: center; font-size: 13px; }
        tr:nth-child(even) { background: #f8f9fa; }
        
        /* Validaciones Visuales */
        .row-conflict { background-color: #f8d7da !important; color: #721c24; border: 2px solid var(--red); }
        .auto-fill { color: #055160; background-color: #cff4fc !important; font-style: italic; }
        .editable { cursor: cell; border-bottom: 1px dashed var(--gold); }
        .editable:focus { background: #fffde7; outline: 2px solid var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h1>ISA - Procesador de Logs (Norte / Sur / Muelle 5)</h1>
    
    <p style="font-size: 14px; color: #555;">Pega el log de la terminal tal cual lo recibes por mail:</p>
    <textarea id="logInput" placeholder="CORPORACION NAVIOS S.A. ..."></textarea>
    
    <div class="controls">
        <button class="btn btn-process" onclick="procesarLog()">Analizar y Unificar</button>
        <button id="btnExport" class="btn btn-export" onclick="descargarExcel()">Descargar Reporte Final</button>
    </div>

    <div id="alertCoherencia" class="alert-box alert-warn"></div>

    <div class="table-container">
        <table id="tablaSOF">
            <thead>
                <tr>
                    <th>#</th>
                    <th>POSICIÓN</th>
                    <th>BARCAZA</th>
                    <th>INICIO</th>
                    <th>FIN</th>
                    <th>TIEMPO</th>
                    <th>EVENTO</th>
                    <th>CONTROL DE COHERENCIA</th>
                </tr>
            </thead>
            <tbody id="resultadoBody"></tbody>
        </table>
    </div>
</div>

<script>
let dataFinal = [];

function procesarLog() {
    const text = document.getElementById('logInput').value;
    const lines = text.split('\n');
    let listaEventos = [];
    let barcazas = { norte: 'SIN BCZA', sur: 'SIN BCZA', m5: 'SIN BCZA' };
    let nro = 1;

    lines.forEach(line => {
        if (!line.includes(':')) return;

        // DIVISIÓN POR ZONAS (Control de 3 Grúas)
        const col1 = line.substring(0, 38).trim();
        const col2 = line.substring(38, 78).trim();
        const col3 = line.substring(78).trim();

        const analizarSeccion = (str, grúa) => {
            if (!str) return;
            
            // Detectar Barcaza (ID)
            if (/[A-Z0-9]{3,}\s\d+/.test(str) && !str.includes(':')) {
                barcazas[grúa] = str;
            }

            // Detectar Horas y Eventos
            const horas = str.match(/\d{2}:\d{2}/g);
            if (horas) {
                let hIni = horas[0];
                let hFin = horas[1] || "";
                let eventoRaw = str.replace(/\d{2}:\d{2}/g, '').trim();
                
                // REGLA DE ORO: Draft Final -> Insertar Finaliza Descarga
                if (eventoRaw.toLowerCase().includes("draft final")) {
                    listaEventos.push({
                        pos: grúa, bcza: barcazas[grúa], ini: hIni, fin: hIni,
                        evento: "FINALIZA DESCARGA DE BARCAZA " + barcazas[grúa],
                        tipo: "auto-fill", nota: "Inserción Automática (Regla de Oro)"
                    });
                }

                listaEventos.push({
                    pos: grúa, bcza: barcazas[grúa], ini: hIni, fin: hFin,
                    evento: eventoRaw.toUpperCase(),
                    tipo: "", nota: "Validado"
                });
            }
        };

        analizarSeccion(col1, 'norte');
        analizarSeccion(col2, 'sur');
        analizarSeccion(col3, 'm5');
    });

    renderizar(listaEventos);
}

function renderizar(eventos) {
    const tbody = document.getElementById('resultadoBody');
    const alertBox = document.getElementById('alertCoherencia');
    tbody.innerHTML = '';
    let errores = 0;

    eventos.forEach((ev, index) => {
        const tr = document.createElement('tr');
        if (ev.tipo) tr.className = ev.tipo;

        // CONTROL DE COHERENCIA: Barcazas huérfanas o solapamientos
        let coherenciaMsg = "OK";
        if (ev.bcza === 'SIN BCZA') {
            tr.className = 'row-conflict';
            coherenciaMsg = "ERROR: Sin ID Barcaza";
            errores++;
        }

        tr.innerHTML = `
            <td>${index + 1}</td>
            <td contenteditable="true">GRÚA ${ev.pos.toUpperCase()}</td>
            <td contenteditable="true"><strong>${ev.bcza}</strong></td>
            <td contenteditable="true">${ev.ini}</td>
            <td contenteditable="true">${ev.fin}</td>
            <td>${calcularHHMM(ev.ini, ev.fin)}</td>
            <td contenteditable="true" style="text-align:left;">${ev.evento}</td>
            <td>${coherenciaMsg}</td>
        `;
        tbody.appendChild(tr);
    });

    if (errores > 0) {
        alertBox.style.display = 'block';
        alertBox.innerText = `Se detectaron ${errores} inconsistencias en el log. Corregir manualmente las celdas en rojo.`;
    } else {
        alertBox.style.display = 'none';
    }

    document.getElementById('btnExport').style.display = 'block';
}

function calcularHHMM(i, f) {
    if (!i || !f) return "00:00";
    let [h1, m1] = i.split(':').map(Number);
    let [h2, m2] = f.split(':').map(Number);
    let d = (h2*60+m2) - (h1*60+m1);
    if (d < 0) d += 1440; // Medianoche
    return `${Math.floor(d/60).toString().padStart(2,'0')}:${(d%60).toString().padStart(2,'0')}`;
}

function descargarExcel() {
    const table = document.getElementById('tablaSOF');
    const wb = XLSX.utils.table_to_book(table, {sheet: "Reporte ISA"});
    XLSX.writeFile(wb, "SOF_UNIFICADO_ISA.xlsx");
}
</script>
</body>
</html>
