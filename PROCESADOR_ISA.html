<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ISA - Consola Operativa Unificada</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #003366; --gold: #c5a059; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7fa; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo { font-size: 32px; font-weight: bold; color: var(--blue); font-style: italic; border-bottom: 2px solid var(--gold); margin-bottom: 20px; }
        .setup { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; background: #fafafa; padding: 20px; border: 1px solid #ddd; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; font-size: 11px; font-weight: bold; color: var(--blue); text-transform: uppercase; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-top: 4px; }
        textarea { width: 100%; height: 200px; font-family: monospace; border: 2px solid var(--blue); padding: 10px; box-sizing: border-box; }
        .btn-group { margin: 20px 0; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-p { background: var(--blue); color: white; }
        .btn-s { background: #28a745; color: white; display: none; margin-left: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 20px; }
        th { background: var(--blue); color: white; padding: 10px; border: 1px solid #000; }
        td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .row-fix { background: #e3f2fd; font-weight: bold; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">ISA</div>
    <div class="setup">
        <div class="field">Remolcador<input type="text" id="v_rem" value="HB SCORPIUS"></div>
        <div class="field">Lugar<input type="text" id="v_lug" value="Terminal Navios"></div>
        <div class="field">Fecha<input type="text" id="v_fec" value="13/03/2026"></div>
        <div class="field">H. Arribo<input type="text" id="h_arr" value="01:15"></div>
        <div class="field">H. Alistamiento<input type="text" id="h_ali" value="01:15"></div>
        <div class="field">H. Autoridades<input type="text" id="h_aut" value="02:00"></div>
        <div class="field">H. Libre Platica<input type="text" id="h_pla" value="02:10"></div>
    </div>
    <textarea id="logInput" placeholder="Pega el log de Navios aquí..."></textarea>
    <div class="btn-group">
        <button class="btn btn-p" onclick="procesar()">Generar SOF</button>
        <button id="btnXLS" class="btn btn-s" onclick="descargar()">Descargar Excel</button>
    </div>
    <table id="tablaSOF">
        <thead><tr><th>FECHA</th><th>BARCAZA</th><th>DESDE</th><th>HASTA</th><th>OBSERVACIONES</th></tr></thead>
        <tbody id="bodySOF"></tbody>
    </table>
</div>

<script>
function procesar() {
    const raw = document.getElementById('logInput').value;
    const tbody = document.getElementById('bodySOF');
    const fec = document.getElementById('v_fec').value;
    const rem = document.getElementById('v_rem').value;
    const lug = document.getElementById('v_lug').value;
    
    let finalHtml = "";

    // 1. EVENTOS AGENCIA (SIEMPRE APARECEN)
    const ag = [
        {h: document.getElementById('h_arr').value, o: `${rem} + 12 barcazas amarra en ${lug}.`},
        {h: document.getElementById('h_ali').value, o: "Carta de alistamiento extendida."},
        {h: document.getElementById('h_aut').value, o: "Autoridades y agencia a bordo."},
        {h: document.getElementById('h_pla').value, o: "Libre platica otorgada."}
    ];
    ag.forEach(ev => {
        if(ev.h) finalHtml += `<tr><td>${fec}</td><td>---</td><td>${ev.h}</td><td></td><td>${ev.o}</td></tr>`;
    });

    // 2. PROCESAR LOG (NORTE, SUR, MUELLE 5)
    const lineas = raw.split('\n');
    let bczaAct = { n: '---', s: '---', m: '---' };

    lineas.forEach(linea => {
        if (linea.trim().length < 5) return;

        // Dividir la línea en 3 secciones si es lo suficientemente larga
        let zonas = [];
        if (linea.length > 80) {
            zonas = [
                {t: linea.substring(0, 38).trim(), g: 'n'},
                {t: linea.substring(38, 78).trim(), g: 's'},
                {t: linea.substring(78).trim(), g: 'm'}
            ];
        } else {
            zonas = [{t: linea.trim(), g: 'n'}]; // Modo flexible si es corto
        }

        zonas.forEach(z => {
            if (!z.t) return;
            // Detectar Barcaza
            if (/[A-Z0-9]{3,}\s\d+/.test(z.t) && !z.t.includes(':')) {
                bczaAct[z.g] = z.t;
            }
            // Detectar Horas
            const horas = z.t.match(/\d{2}:\d{2}/g);
            if (horas) {
                let h1 = horas[0], h2 = horas[1] || "";
                let obs = z.t.replace(/\d{2}:\d{2}/g, '').trim().toUpperCase();
                
                // REGLA DE ORO
                if (obs.includes("DRAFT FINAL") || obs.includes("FINALIZA")) {
                    finalHtml += `<tr class="row-fix"><td>${fec}</td><td>${bczaAct[z.g]}</td><td>${h1}</td><td></td><td>FINALIZA DESCARGA DE BARCAZA ${bczaAct[z.g]}</td></tr>`;
                }
                finalHtml += `<tr><td>${fec}</td><td>${bczaAct[z.g]}</td><td>${h1}</td><td>${h2}</td><td>${obs}</td></tr>`;
            }
        });
    });

    tbody.innerHTML = finalHtml;
    document.getElementById('btnXLS').style.display = 'inline-block';
}

function descargar() {
    const table = document.getElementById('tablaSOF');
    const wb = XLSX.utils.table_to_book(table);
    XLSX.writeFile(wb, "ISA_SOF_FINAL.xlsx");
}
</script>
</body>
</html>
