<script>
const SHEET_ID = '1qiVGOMETa9z0mDuJAVR-cl0vlL-CV7gUxz1WJ7coG5M';
const GID_BUQUES  = '1062912056';
const GID_FLUVIAL = '793637404';

// ===== STORAGE KEYS =====
const STORAGE_KEY_BUQUES = 'isa_finalizados_buques';
const STORAGE_KEY_FLUVIAL = 'isa_finalizados_fluvial';

let rawBuques = [], rawFluvial = [];

function csvUrl(gid){ return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&t=${Date.now()}`; }

function splitLine(line){
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){q=!q;}
    else if(ch===','&&!q){r.push(c.trim());c='';}
    else{c+=ch;}
  }
  r.push(c.trim());
  return r;
}

function parseSheet(text){
  return text.split('\n').map(l=>splitLine(l));
}

// ===== PARSING ROBUSTO DE FECHAS =====
// Entiende: DD/MM/YYYY, DD-MM-YYYY, YYYY-MM-DD, etc.
function parseDate(dateStr) {
  if (!dateStr || dateStr.trim() === '') return null;
  
  const s = dateStr.trim();
  
  // Intenta ISO primero (YYYY-MM-DD o YYYY-MM-DDTHH:MM:SS)
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    const d = new Date(s);
    return isNaN(d.getTime()) ? null : d;
  }
  
  // Intenta DD/MM/YYYY o DD-MM-YYYY
  const match = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
  if (match) {
    const [, day, month, year] = match.map(Number);
    // Validar rango bÃ¡sico
    if (day < 1 || day > 31 || month < 1 || month > 12 || year < 2000) {
      return null;
    }
    // Crear fecha en UTC para evitar problemas de timezone
    const d = new Date(Date.UTC(year, month - 1, day));
    return isNaN(d.getTime()) ? null : d;
  }
  
  return null;
}

// ===== GENERAR ID ÚNICO PARA UN REGISTRO =====
// Usa nombre (col 0) + fecha finalización (col 11) como clave Ãºnica
function getRegistroId(row, tipo) {
  if (!row || row.length < 12) return null;
  const nombre = (row[0] || '').trim();
  const fecha = (row[11] || '').trim();
  
  if (!nombre) return null;
  
  // Si no hay fecha de finalización, no se puede marcar como finalizado
  if (!fecha) return null;
  
  // Hash simple: tipo_nombre_fecha
  return `${tipo}_${nombre}_${fecha}`.replace(/\s+/g, '_');
}

// ===== MARCAR REGISTRO COMO FINALIZADO =====
function markAsFinalized(registroId, tipo) {
  const storageKey = tipo === 'buques' ? STORAGE_KEY_BUQUES : STORAGE_KEY_FLUVIAL;
  let finalizados = {};
  
  try {
    const stored = localStorage.getItem(storageKey);
    if (stored) {
      finalizados = JSON.parse(stored);
    }
  } catch (e) {
    console.warn('Error leyendo localStorage:', e);
  }
  
  // Guardar timestamp de cuando fue finalizado
  finalizados[registroId] = Date.now();
  
  try {
    localStorage.setItem(storageKey, JSON.stringify(finalizados));
  } catch (e) {
    console.warn('Error escribiendo localStorage:', e);
  }
}

// ===== VERIFICAR SI DEBE OCULTARSE =====
function shouldHideRecord(registroId, tipo) {
  if (!registroId) return false;
  
  const storageKey = tipo === 'buques' ? STORAGE_KEY_BUQUES : STORAGE_KEY_FLUVIAL;
  let finalizados = {};
  
  try {
    const stored = localStorage.getItem(storageKey);
    if (stored) {
      finalizados = JSON.parse(stored);
    }
  } catch (e) {
    console.warn('Error leyendo localStorage:', e);
    return false;
  }
  
  const timestamp = finalizados[registroId];
  if (!timestamp) return false;
  
  // Pasaron mas de 24 horas desde que fue marcado como finalizado?
  const ahora = Date.now();
  const horasTranscurridas = (ahora - timestamp) / (1000 * 60 * 60);
  
  return horasTranscurridas > 24;
}

// ===== LIMPIAR REGISTROS OBSOLETOS =====
// Elimina del localStorage los que ya hace mas de 24hs
function cleanUpOldRecords(tipo) {
  const storageKey = tipo === 'buques' ? STORAGE_KEY_BUQUES : STORAGE_KEY_FLUVIAL;
  let finalizados = {};
  
  try {
    const stored = localStorage.getItem(storageKey);
    if (stored) {
      finalizados = JSON.parse(stored);
    }
  } catch (e) {
    return;
  }
  
  const ahora = Date.now();
  const cleaned = {};
  
  for (const [key, timestamp] of Object.entries(finalizados)) {
    const horasTranscurridas = (ahora - timestamp) / (1000 * 60 * 60);
    if (horasTranscurridas <= 24) {
      cleaned[key] = timestamp;
    }
  }
  
  try {
    localStorage.setItem(storageKey, JSON.stringify(cleaned));
  } catch (e) {
    console.warn('Error limpiando localStorage:', e);
  }
}

// ---- MUELLE COLOR CLASS ----
function muelleClass(name){
  const n=(name||'').toUpperCase();
  if(n.includes('ANP')||n.includes('TGU')) return 'anp';
  if(n.includes('ARENAL')) return 'arenal';
  if(n.includes('ONTUR')) return 'ontur';
  if(n.includes('DESIGNAR')) return 'designar';
  return 'navios';
}

// ---- STATUS BADGE ----
function statusBadge(val){

  if(v.includes('NAVEG')) return `<span class="badge navegando"><span class="bdot"></span>Navegando</span>`;
  if(v.trim()==='') return '';
  return `<span class="badge tbc"><span class="bdot"></span>${val}</span>`;
}

// ---- PARSE BUQUES ----
function parseBuques(rows){
  const sections=[];
  let current=null;
  const MUELLE_KEYWORDS=['NAVIOS','ANP','PUNTA','ONTUR','MUELLE','TGU'];
  const HEADER_KEYWORDS=['BUQUE','REMOLCADOR','ETA','ETB','ETC','CARGA','VOLUMEN'];

  for(let i=0;i<rows.length;i++){
    const row=rows[i];
    const a=(row[0]||'').trim();
    const b=(row[1]||'').trim();
    if(!a) continue;
    const isMuelle=MUELLE_KEYWORDS.some(k=>a.toUpperCase().includes(k));
    const isHeader=HEADER_KEYWORDS.some(k=>a.toUpperCase().includes(k)||b.toUpperCase().includes(k));
    if(isMuelle&&!isHeader){
      current={name:a, rows:[]};
      sections.push(current);
      continue;
    }
    if(isHeader) continue;
    if(current && a && !isMuelle){
      current.rows.push(row);
    }
  }
  return sections;
}

// ---- PARSE FLUVIAL ----
function parseFluvial(rows){
  const sections=[];
  let current=null;
  const MUELLE_KEYWORDS=['NAVIOS','ANP','PUNTA','ONTUR','MUELLE'];
  const HEADER_KEYWORDS=['REMOLCADOR','BARCAZA','ESTADO','ETA','DESCARGA'];

  for(let i=0;i<rows.length;i++){
    const row=rows[i];
    const a=(row[0]||'').trim();
    if(!a) continue;
    const isMuelle=MUELLE_KEYWORDS.some(k=>a.toUpperCase().includes(k));
    const isHeader=HEADER_KEYWORDS.some(k=>a.toUpperCase().includes(k));
    if(isMuelle&&!isHeader){
      current={name:a, rows:[]};
      sections.push(current);
      continue;
    }
    if(isHeader) continue;
    if(current && a && !isMuelle){
      current.rows.push(row);
    }
  }
  return sections;
}

// ---- RENDER BUQUES ----
function renderBuques(sections, search=''){
  cleanUpOldRecords('buques');
  const s=search.toLowerCase();
  let totalBuques=0;
  let html='';

  // Contar solo registros que NO estan ocultos (no finalizados hace 24hs)
  sections.forEach(sec=>{
    sec.rows.forEach(r=>{
      if(r[0]){
        const registroId = getRegistroId(r, 'buques');

        }
      }
    });
  });

  html+=`<div class="summary-row">

    <div class="sum-card orange"><div class="sum-label">ActualizaciÃ³n</div><div class="sum-num" style="font-size:16px;padding-top:4px" id="upd-b">â€”</div><div class="sum-sub">Tiempo real</div></div>
  </div>`;

  sections.forEach(sec=>{
    // Filtrar por bÃºsqueda Y por estado (no ocultos)
    const filtered=sec.rows.filter(r=>{
      const registroId = getRegistroId(r, 'buques');
      const isHidden = shouldHideRecord(registroId, 'buques');
      if(isHidden) return false;
      if(!s) return true;
      return r.some(c=>c.toLowerCase().includes(s));
    });

    if(s && filtered.length===0) return;
    const mc=muelleClass(sec.name);
    html+=`<div class="muelle-section">
      <div class="muelle-header ${mc}">
        <span class="muelle-name">${sec.name}</span>
        <span class="muelle-badge">${filtered.length} buque${filtered.length!==1?'s':''}</span>
      </div>`;
    
    if(filtered.length===0){
      html+=`<div class="empty-muelle">Sin operaciones programadas</div>`;
    } else {
      html+=`<table><thead><tr>
        <th>Buque</th><th>ETA Roads</th><th>ETB</th><th>ETC</th>
        <th>Carga</th><th>Volumen</th><th>Cliente / Shipper</th>
        <th>Destino</th><th>Persona</th><th>Comentarios</th>
      </tr></thead><tbody>`;
      filtered.forEach(r=>{
        const buque=r[0]||'';const eta=r[1]||'';const etb=r[2]||'';const etc=r[3]||'';
        const carga=r[4]||'';const vol=r[5]||'';const cliente=r[6]||'';
        const destino=r[7]||'';const persona=r[8]||'';const comment=r[9]||'';
        const fechaFin=r[11]||'';
        
        if(!buque) return;
        
        // Si tiene fecha de finalizacion, ofrecer marcar como finalizado
        const onclick = fechaFin ? `onclick="markAsFinalized(getRegistroId(['${buque}',null,null,null,null,null,null,null,null,null,null,'${fechaFin}'], 'buques'), 'buques'); loadAll();"` : '';
        const style = fechaFin ? 'cursor:pointer;opacity:0.7;' : '';
        const title = fechaFin ? 'Haz clic para ocultarlo' : '';
        
        html+=`<tr style="${style}" title="${title}" ${onclick}>
          <td class="cell-main">${buque}</td>
          <td class="cell-sec">${eta}</td>
          <td class="cell-sec">${etb}</td>
          <td class="cell-sec">${etc}</td>
          <td><span style="font-size:11px;font-weight:600;color:var(--accent)">${carga}</span></td>
          <td class="cell-num">${vol}</td>
          <td class="cell-sec">${cliente}</td>
          <td class="cell-muted">${destino}</td>
          <td class="cell-muted">${persona}</td>
          <td class="cell-comment">${comment}</td>
        </tr>`;
      });
      html+=`</tbody></table>`;
    }
    html+=`</div>`;
  });

  document.getElementById('loading-buques').style.display='none';
  const cont=document.getElementById('content-buques');
  cont.style.display='block';
  cont.innerHTML=html;
  document.getElementById('cnt-buques').textContent=totalBuques;
  const updB=document.getElementById('upd-b');
  if(updB) updB.textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}

// ---- RENDER FLUVIAL ----
function renderFluvial(sections, search=''){
  cleanUpOldRecords('fluvial');
  const s=search.toLowerCase();
  let totalRems=0;
  let html='';

  // Contar solo registros que NO estÃ¡n ocultos
  sections.forEach(sec=>{
    sec.rows.forEach(r=>{
      if(r[0]){
        const registroId = getRegistroId(r, 'fluvial');
        if(!shouldHideRecord(registroId, 'fluvial')){
          totalRems++;
        }
      }
    });
  });

  html+=`<div class="summary-row">
    <div class="sum-card accent"><div class="sum-label">Remolcadores</div><div class="sum-num">${totalRems}</div><div class="sum-sub">En planilla</div></div>
    <div class="sum-card green"><div class="sum-label">Muelles activos</div><div class="sum-num">${sections.filter(s=>s.rows.some(r=>{const id=getRegistroId(r,'fluvial');return !shouldHideRecord(id,'fluvial');})).length}</div><div class="sum-sub">Con operaciones</div></div>
    <div class="sum-card orange"><div class="sum-label">ActualizaciÃ³n</div><div class="sum-num" style="font-size:16px;padding-top:4px" id="upd-f">â€”</div><div class="sum-sub">Tiempo real</div></div>
  </div>`;

  sections.forEach(sec=>{
    // Filtrar por busqueda Y por estado (no ocultos)
    const filtered=sec.rows.filter(r=>{
      const registroId = getRegistroId(r, 'fluvial');
      const isHidden = shouldHideRecord(registroId, 'fluvial');
      if(isHidden) return false;
      if(!s) return true;
      return r.some(c=>c.toLowerCase().includes(s));
    });

    if(s && filtered.length===0) return;
    const mc=muelleClass(sec.name);
    html+=`<div class="muelle-section">
      <div class="muelle-header ${mc}">
        <span class="muelle-name">${sec.name}</span>
        <span class="muelle-badge">${filtered.length} remolcador${filtered.length!==1?'es':''}</span>
      </div>`;
    
    if(filtered.length===0){
      html+=`<div class="empty-muelle">Sin operaciones programadas</div>`;
    } else {
      html+=`<table><thead><tr>
        <th>Remolcador</th><th>Barcazas</th><th>Estado</th><th>ETA Roads</th>
        <th>ETB</th><th>Final</th><th>Descarga</th><th>Volumen</th>
        <th>Cliente</th><th>Persona</th><th>Comentarios</th>
      </tr></thead><tbody>`;
      filtered.forEach(r=>{
        const rem=r[0]||'';const bczs=r[1]||'';const estado=r[2]||'';const eta=r[3]||'';
        const etb=r[4]||'';const fin=r[5]||'';const desc=r[6]||'';const vol=r[7]||'';
        const cli=r[8]||'';const pers=r[9]||'';const comm=r[10]||'';
        const fechaFin=r[11]||'';
        
        if(!rem) return;
        
        const onclick = fechaFin ? `onclick="markAsFinalized(getRegistroId(['${rem}',null,null,null,null,null,null,null,null,null,null,'${fechaFin}'], 'fluvial'), 'fluvial'); loadAll();"` : '';
        const style = fechaFin ? 'cursor:pointer;opacity:0.7;' : '';
        const title = fechaFin ? 'Haz clic para ocultarlo' : '';
        
        html+=`<tr style="${style}" title="${title}" ${onclick}>
          <td class="cell-main">${rem}</td>
          <td class="cell-num">${bczs}</td>
          <td>${statusBadge(estado)}</td>
          <td class="cell-sec">${eta}</td>
          <td class="cell-sec">${etb}</td>
          <td class="cell-sec">${fin}</td>
          <td><span style="font-size:11px;font-weight:600;color:var(--accent)">${desc}</span></td>
          <td class="cell-num">${vol?Number(vol.replace(/[^0-9.]/g,'')).toLocaleString('es-AR'):''}</td>
          <td class="cell-sec">${cli}</td>
          <td class="cell-muted">${pers}</td>
          <td class="cell-comment">${comm}</td>
        </tr>`;
      });
      html+=`</tbody></table>`;
    }
    html+=`</div>`;
  });

  document.getElementById('loading-fluvial').style.display='none';
  const cont=document.getElementById('content-fluvial');
  cont.style.display='block';
  cont.innerHTML=html;
  document.getElementById('cnt-fluvial').textContent=totalRems;
  const updF=document.getElementById('upd-f');
  if(updF) updF.textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}

async function loadAll(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spin');
  try {
    const [rb, rf] = await Promise.all([
      fetch(csvUrl(GID_BUQUES)).then(r=>r.text()),
      fetch(csvUrl(GID_FLUVIAL)).then(r=>r.text())
    ]);
    rawBuques  = parseBuques(parseSheet(rb));
    rawFluvial = parseFluvial(parseSheet(rf));
    renderBuques(rawBuques);
    renderFluvial(rawFluvial);
    const t=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-upd').textContent='Actualizado '+t;
  } catch(e) {
    console.error('Error cargando datos:', e);
    ['buques','fluvial'].forEach(tab=>{
      document.getElementById('loading-'+tab).style.display='none';
      document.getElementById('content-'+tab).style.display='block';
      document.getElementById('content-'+tab).innerHTML=`<div class="error-state">Error al cargar los datos. VerificÃ¡ los permisos del Sheet.</div>`;
    });
  }
  btn.classList.remove('spin');
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('pane-'+tab).classList.add('active');
}

function applySearch(){
  const s=document.getElementById('search').value;
  renderBuques(rawBuques, s);
  renderFluvial(rawFluvial, s);
}

// Auto-refresh cada 5 minutos
loadAll();
setInterval(loadAll, 5*60*1000);

// Verificar cada minuto si hay registros que deben ocultarse (>24hs)
// Esto re-renderiza sin descargar el Sheet nuevamente
setInterval(() => {
  renderBuques(rawBuques);
  renderFluvial(rawFluvial);
}, 60*1000);
</script>
