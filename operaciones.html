<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISA - Proximas Operaciones Nueva Palmira</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;1,800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy2:#0d1f3c;--navy3:#112040;
  --blue:#1a3a8c;--blue-mid:#2d5cb8;--blue-light:#3a7bd5;--accent:#00b4d8;
  --white:#fff;--off-white:#e8eef8;--muted:rgba(255,255,255,.45);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --green:#22c55e;--orange:#f97316;--red:#ef4444;--yellow:#eab308;
  --green-bg:rgba(34,197,94,.12);--orange-bg:rgba(249,115,22,.12);
  --red-bg:rgba(239,68,68,.12);--yellow-bg:rgba(234,179,8,.12);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--white);display:flex;flex-direction:column;}
.bg{position:fixed;inset:0;z-index:0;}
.bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 10% 50%,rgba(26,58,140,.4) 0%,transparent 70%),linear-gradient(160deg,#0a1628 0%,#0d1f3c 60%,#0a1628 100%);}
.bg-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:60px 60px;}
.side-accent{position:fixed;left:0;top:0;bottom:0;width:3px;z-index:20;background:linear-gradient(180deg,transparent 0%,var(--accent) 40%,var(--blue-light) 70%,transparent 100%);opacity:.6;}

/* HEADER */
.isa-header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;border-bottom:1px solid var(--border);flex-shrink:0;}
.logo-wrap{display:flex;align-items:center;}
.logo-isa{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:800;font-style:italic;color:var(--white);letter-spacing:2px;line-height:1;position:relative;}
.logo-isa::after{content:'';position:absolute;bottom:-3px;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--accent),var(--blue-light));}
.logo-sub{margin-left:12px;padding-left:12px;border-left:1px solid rgba(255,255,255,.2);display:flex;flex-direction:column;gap:1px;}
.logo-name{font-size:11px;font-weight:600;color:var(--off-white);letter-spacing:.14em;text-transform:uppercase}
.logo-tag{font-size:9px;font-weight:300;color:var(--muted);letter-spacing:.16em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:12px;}
.back-link{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);text-decoration:none;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border:1px solid rgba(255,255,255,.12);border-radius:6px;transition:all .15s;}
.back-link:hover{color:var(--white);border-color:rgba(255,255,255,.3);}
.refresh-btn{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;background:rgba(0,180,216,.1);border:1px solid rgba(0,180,216,.25);border-radius:6px;padding:5px 12px;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px;}
.refresh-btn:hover{background:rgba(0,180,216,.2);}
.refresh-btn .icon{display:inline-block;transition:transform .1s;}
.refresh-btn.spin .icon{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.last-upd{font-size:10px;color:var(--muted);letter-spacing:.05em;}
.status-dot{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* TITLE BAR */
.title-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:.8rem 2rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.page-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.search-input{font-size:12px;font-family:'Barlow',sans-serif;padding:6px 13px;background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:8px;color:var(--white);outline:none;width:200px;transition:all .15s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--accent);background:rgba(255,255,255,.09);}
.hide-btn{font-size:11px;font-weight:600;color:#ef4444;text-transform:uppercase;letter-spacing:.08em;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:6px 12px;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .15s;display:flex;align-items:center;gap:2px;}
.hide-btn:hover{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4);}

/* TABS */
.tabs-bar{position:relative;z-index:10;display:flex;align-items:center;padding:0 2rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:12px 20px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;display:flex;align-items:center;gap:8px;}
.tab-btn:hover{color:var(--white);}
.tab-btn.active{color:var(--white);border-bottom-color:var(--accent);}
.tab-count{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.08);color:var(--muted);}
.tab-btn.active .tab-count{background:rgba(0,180,216,.2);color:var(--accent);}

/* MAIN CONTENT */
.main-content{position:relative;z-index:10;flex:1;overflow:hidden;display:flex;flex-direction:column;}
.tab-pane{display:none;flex:1;overflow-y:auto;padding:1.25rem 2rem;}
.tab-pane.active{display:block;}

/* MUELLE SECTION */
.muelle-section{margin-bottom:1.75rem;}
.muelle-header{display:flex;align-items:center;gap:10px;margin-bottom:.75rem;padding:.5rem .75rem;border-radius:8px;border-left:3px solid;}
.muelle-header.navios{border-color:var(--accent);background:rgba(0,180,216,.06);}
.muelle-header.anp{border-color:var(--yellow);background:rgba(234,179,8,.06);}
.muelle-header.arenal{border-color:var(--orange);background:rgba(249,115,22,.06);}
.muelle-header.ontur{border-color:var(--green);background:rgba(34,197,94,.06);}
.muelle-header.designar{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.03);}
.muelle-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.muelle-header.navios .muelle-name{color:var(--accent);}
.muelle-header.anp .muelle-name{color:var(--yellow);}
.muelle-header.arenal .muelle-name{color:var(--orange);}
.muelle-header.ontur .muelle-name{color:var(--green);}
.muelle-header.designar .muelle-name{color:rgba(255,255,255,.5);}
.muelle-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.08);color:var(--muted);margin-left:auto;}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:rgba(255,255,255,.05);}
thead th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);white-space:nowrap;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid rgba(255,255,255,.035);transition:background .1s;}
tbody tr:hover{background:rgba(255,255,255,.04);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:8px 12px;vertical-align:middle;}
.cell-main{font-weight:600;color:var(--white);font-size:13px;}
.cell-sec{color:rgba(255,255,255,.65);font-size:12px;}
.cell-muted{color:var(--muted);font-size:11px;}
.cell-num{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--accent);}
.cell-comment{font-size:11px;color:rgba(255,255,255,.45);max-width:260px;line-height:1.4;}

tbody tr.finalizado{cursor:pointer;opacity:0.65;}
tbody tr.finalizado:hover{opacity:0.75;background:rgba(0,180,216,.1);}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid;white-space:nowrap;}
.bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.badge.puerto{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.3);color:var(--green);}
.badge.puerto .bdot{background:var(--green);}
.badge.navegando{background:rgba(0,180,216,.12);border-color:rgba(0,180,216,.3);color:var(--accent);}
.badge.navegando .bdot{background:var(--accent);}
.badge.tbc{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:var(--muted);}
.badge.tbc .bdot{background:var(--muted);}

/* LOADING / EMPTY */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem;gap:1rem;}
.spinner{width:30px;height:30px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
.loading-txt{font-size:13px;color:var(--muted);}
.empty-muelle{padding:.75rem 1rem;font-size:12px;color:rgba(255,255,255,.25);font-style:italic;border:1px dashed rgba(255,255,255,.08);border-radius:8px;text-align:center;}
.error-state{text-align:center;padding:3rem;color:var(--red);font-size:13px;}

/* SUMMARY ROW */
.summary-row{display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;}
.sum-card{flex:1;min-width:120px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;}
.sum-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem;}
.sum-num{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--white);}
.sum-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.sum-card.accent{border-color:rgba(0,180,216,.2);background:rgba(0,180,216,.06);}
.sum-card.accent .sum-num{color:var(--accent);}
.sum-card.green{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.06);}
.sum-card.green .sum-num{color:var(--green);}
.sum-card.orange{border-color:rgba(249,115,22,.2);background:rgba(249,115,22,.06);}
.sum-card.orange .sum-num{color:var(--orange);}

@media(max-width:768px){
  html,body{overflow:auto;}
  .tab-pane{overflow:visible;}
  .main-content{overflow:visible;}
  table{font-size:11px;}
  .summary-row{flex-direction:column;}
}
</style>
</head>
<body>
<div class="bg"><div class="bg-grad"></div><div class="bg-lines"></div></div>
<div class="side-accent"></div>

<!-- HEADER -->
<div class="isa-header">
  <div class="logo-wrap">
    <div class="logo-isa">ISA</div>

    <div class="page-title">Nueva Palmira - Proximas Operaciones</div>

<!-- CONTENT -->
<div class="main-content">

  <!-- BUQUES PANE -->

      <div class="spinner"></div>
      <div class="loading-txt">Cargando operaciones...</div>
    </div>
    <div id="content-buques" style="display:none"></div>
  </div>

  <!-- FLUVIAL PANE -->
  <div class="tab-pane" id="pane-fluvial">
    <div class="loading-wrap" id="loading-fluvial">
      <div class="spinner"></div>
      <div class="loading-txt">Cargando operaciones...</div>
    </div>
    <div id="content-fluvial" style="display:none"></div>
  </div>

</div>

<script>
const SHEET_ID = '1qiVGOMETa9z0mDuJAVR-cl0vlL-CV7gUxz1WJ7coG5M';
const GID_BUQUES  = '1062912056';
const GID_FLUVIAL = '793637404';

const STORAGE_KEY_BUQUES = 'isa_finalizados_buques';
const STORAGE_KEY_FLUVIAL = 'isa_finalizados_fluvial';

let rawBuques = [], rawFluvial = [];

function csvUrl(gid){ return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&t=${Date.now()}`; }

function splitLine(line){
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){q=!q;}
    else if(ch===','&&!q){r.push(c.trim());c='';}
    else{c+=ch;}
  }
  r.push(c.trim());
  return r;
}

function parseSheet(text){
  return text.split('\n').map(l=>splitLine(l));
}

function parseDate(dateStr) {
  if (!dateStr || dateStr.trim() === '') return null;
  const s = dateStr.trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    const d = new Date(s);
    return isNaN(d.getTime()) ? null : d;
  }
  const match = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
  if (match) {
    const [, day, month, year] = match.map(Number);
    if (day < 1 || day > 31 || month < 1 || month > 12 || year < 2000) {
      return null;
    }
    const d = new Date(Date.UTC(year, month - 1, day));
    return isNaN(d.getTime()) ? null : d;
  }
  return null;
}

function getRegistroId(row, tipo) {
  if (!row || row.length < 1) return null;
  const nombre = (row[0] || '').trim();
  const fechaIdx = tipo === 'buques' ? 3 : 5;
  const fecha = (row[fechaIdx] || '').trim();
  if (!nombre) return null;
  if (!fecha) return null;
  return `${tipo}_${nombre}_${fecha}`.replace(/\s+/g, '_');
}

function markAsFinalized(registroId, tipo) {
  const storageKey = tipo === 'buques' ? STORAGE_KEY_BUQUES : STORAGE_KEY_FLUVIAL;
  let finalizados = {};
  try {
    const stored = localStorage.getItem(storageKey);
    if (stored) {
      finalizados = JSON.parse(stored);
    }
  } catch (e) {
    console.warn('Error:', e);
  }
  finalizados[registroId] = Date.now();
  try {
    localStorage.setItem(storageKey, JSON.stringify(finalizados));
  } catch (e) {
    console.warn('Error:', e);
  }
}

function shouldHideRecord(registroId, tipo) {
  if (!registroId) return false;
  const storageKey = tipo === 'buques' ? STORAGE_KEY_BUQUES : STORAGE_KEY_FLUVIAL;
  let finalizados = {};
  try {
    const stored = localStorage.getItem(storageKey);
    if (stored) {
      finalizados = JSON.parse(stored);
    }
  } catch (e) {
    return false;
  }
  const timestamp = finalizados[registroId];
  if (!timestamp) return false;
  const ahora = Date.now();
  const horasTranscurridas = (ahora - timestamp) / (1000 * 60 * 60);
  return horasTranscurridas > 2;
}

function cleanUpOldRecords(tipo) {
  const storageKey = tipo === 'buques' ? STORAGE_KEY_BUQUES : STORAGE_KEY_FLUVIAL;
  let finalizados = {};
  try {
    const stored = localStorage.getItem(storageKey);
    if (stored) {
      finalizados = JSON.parse(stored);
    }
  } catch (e) {
    return;
  }
  const ahora = Date.now();
  const cleaned = {};
  for (const [key, timestamp] of Object.entries(finalizados)) {
    const horasTranscurridas = (ahora - timestamp) / (1000 * 60 * 60);
    if (horasTranscurridas <= 2) {
      cleaned[key] = timestamp;
    }
  }
  try {
    localStorage.setItem(storageKey, JSON.stringify(cleaned));
  } catch (e) {
    console.warn('Error:', e);
  }
}

// Funcion global para marcar como finalizado
function toggleFinalized(registroId, tipo) {
  markAsFinalized(registroId, tipo);
  loadAll();
}

// Ocultar TODOS los finalizados de una vez
function hideAllFinalized() {
  const storageKeyBuques = STORAGE_KEY_BUQUES;
  const storageKeyFluvial = STORAGE_KEY_FLUVIAL;
  let finalizadosBuques = {}, finalizadosFluvial = {};
  
  try {
    const storedB = localStorage.getItem(storageKeyBuques);
    const storedF = localStorage.getItem(storageKeyFluvial);
    if (storedB) finalizadosBuques = JSON.parse(storedB);
    if (storedF) finalizadosFluvial = JSON.parse(storedF);
  } catch (e) {
    console.warn('Error:', e);
  }
  
  const ahora = Date.now();
  
  // Marcar todos los buques con fecha final como finalizados
  rawBuques.forEach(sec => {
    sec.rows.forEach(r => {
      const fechaFin = (r[3] || '').trim();
      if (fechaFin) {
        const registroId = getRegistroId(r, 'buques');
        if (registroId && !finalizadosBuques[registroId]) {
          finalizadosBuques[registroId] = ahora;
        }
      }
    });
  });
  
  // Marcar todos los fluviales con fecha final como finalizados
  rawFluvial.forEach(sec => {
    sec.rows.forEach(r => {
      const fechaFin = (r[3] || '').trim();
      if (fechaFin) {
        const registroId = getRegistroId(r, 'fluvial');
        if (registroId && !finalizadosFluvial[registroId]) {
          finalizadosFluvial[registroId] = ahora;
        }
      }
    });
  });
  
  try {
    localStorage.setItem(storageKeyBuques, JSON.stringify(finalizadosBuques));
    localStorage.setItem(storageKeyFluvial, JSON.stringify(finalizadosFluvial));
  } catch (e) {
    console.warn('Error:', e);
  }
  
  loadAll();
}

// Contar finalizados y actualizar UI
function updateFinalizadoCount() {
  let totalFinalizados = 0;
  
  rawBuques.forEach(sec => {
    sec.rows.forEach(r => {
      const fechaFin = (r[3] || '').trim();
      if (fechaFin) {
        totalFinalizados++;
      }
    });
  });
  
  rawFluvial.forEach(sec => {
    sec.rows.forEach(r => {
      const fechaFin = (r[3] || '').trim();
      if (fechaFin) {
        totalFinalizados++;
      }
    });
  });
  
  console.log('Total finalizados encontrados:', totalFinalizados);
  
  const hideBtn = document.getElementById('hide-btn');
  const contador = document.getElementById('finalizado-count');
  
  contador.textContent = totalFinalizados;
  
  if (totalFinalizados > 0) {
    hideBtn.style.opacity = '1';
    hideBtn.style.pointerEvents = 'auto';
  } else {
    hideBtn.style.opacity = '0.5';
    hideBtn.style.pointerEvents = 'none';
  }
}

function muelleClass(name){
  const n=(name||'').toUpperCase();
  if(n.includes('ANP')||n.includes('TGU')) return 'anp';
  if(n.includes('ARENAL')) return 'arenal';
  if(n.includes('ONTUR')) return 'ontur';
  if(n.includes('DESIGNAR')) return 'designar';
  return 'navios';
}

function statusBadge(val){
  const v=(val||'').toUpperCase();
  if(v.includes('PUERTO')) return `<span class="badge puerto"><span class="bdot"></span>En Puerto</span>`;
  if(v.includes('NAVEG')) return `<span class="badge navegando"><span class="bdot"></span>Navegando</span>`;
  if(v.trim()==='') return '';
  return `<span class="badge tbc"><span class="bdot"></span>${val}</span>`;
}

function parseBuques(rows){
  const sections=[];
  let current=null;
  const MUELLE_KEYWORDS=['NAVIOS','ANP','PUNTA','ONTUR','MUELLE','TGU'];
  const HEADER_KEYWORDS=['BUQUE','REMOLCADOR','ETA','ETB','ETC','CARGA','VOLUMEN'];
  for(let i=0;i<rows.length;i++){
    const row=rows[i];
    const a=(row[0]||'').trim();
    const b=(row[1]||'').trim();
    if(!a) continue;
    const isMuelle=MUELLE_KEYWORDS.some(k=>a.toUpperCase().includes(k));
    const isHeader=HEADER_KEYWORDS.some(k=>a.toUpperCase().includes(k)||b.toUpperCase().includes(k));
    if(isMuelle&&!isHeader){
      current={name:a, rows:[]};
      sections.push(current);
      continue;
    }
    if(isHeader) continue;
    if(current && a && !isMuelle){
      current.rows.push(row);
    }
  }
  return sections;
}

function parseFluvial(rows){
  const sections=[];
  let current=null;
  const MUELLE_KEYWORDS=['NAVIOS','ANP','PUNTA','ONTUR','MUELLE'];
  const HEADER_KEYWORDS=['REMOLCADOR','BARCAZA','ESTADO','ETA','DESCARGA'];
  for(let i=0;i<rows.length;i++){
    const row=rows[i];
    const a=(row[0]||'').trim();
    if(!a) continue;
    const isMuelle=MUELLE_KEYWORDS.some(k=>a.toUpperCase().includes(k));
    const isHeader=HEADER_KEYWORDS.some(k=>a.toUpperCase().includes(k));
    if(isMuelle&&!isHeader){
      current={name:a, rows:[]};
      sections.push(current);
      continue;
    }
    if(isHeader) continue;
    if(current && a && !isMuelle){
      current.rows.push(row);
    }
  }
  return sections;
}

function renderBuques(sections, search=''){
  cleanUpOldRecords('buques');
  const s=search.toLowerCase();
  let totalBuques=0;
  let html='';
  sections.forEach(sec=>{
    sec.rows.forEach(r=>{
      if(r[0]){
        const registroId = getRegistroId(r, 'buques');
        if(!shouldHideRecord(registroId, 'buques')){
          totalBuques++;
        }
      }
    });
  });
  html+=`<div class="summary-row">
    <div class="sum-card accent"><div class="sum-label">Total Buques</div><div class="sum-num">${totalBuques}</div><div class="sum-sub">En planilla</div></div>
    <div class="sum-card green"><div class="sum-label">Muelles activos</div><div class="sum-num">${sections.filter(s=>s.rows.some(r=>{const id=getRegistroId(r,'buques');return !shouldHideRecord(id,'buques');})).length}</div><div class="sum-sub">Con operaciones</div></div>
    <div class="sum-card orange"><div class="sum-label">Actualizacion</div><div class="sum-num" style="font-size:16px;padding-top:4px" id="upd-b">-</div><div class="sum-sub">Tiempo real</div></div>
  </div>`;
  sections.forEach(sec=>{
    const filtered=sec.rows.filter(r=>{
      const registroId = getRegistroId(r, 'buques');
      const isHidden = shouldHideRecord(registroId, 'buques');
      if(isHidden) return false;
      if(!s) return true;
      return r.some(c=>c.toLowerCase().includes(s));
    });
    if(s && filtered.length===0) return;
    const mc=muelleClass(sec.name);
    html+=`<div class="muelle-section">
      <div class="muelle-header ${mc}">
        <span class="muelle-name">${sec.name}</span>
        <span class="muelle-badge">${filtered.length} buque${filtered.length!==1?'s':''}</span>
      </div>`;
    if(filtered.length===0){
      html+=`<div class="empty-muelle">Sin operaciones programadas</div>`;
    } else {
      html+=`<table><thead><tr>
        <th>Buque</th><th>ETA Roads</th><th>ETB</th><th>ETC</th>
        <th>Carga</th><th>Volumen</th><th>Cliente / Shipper</th>
        <th>Destino</th><th>Persona</th><th>Comentarios</th>
      </tr></thead><tbody>`;
      filtered.forEach(r=>{
        const buque=r[0]||'';const eta=r[1]||'';const etb=r[2]||'';const etc=r[3]||'';
        const carga=r[4]||'';const vol=r[5]||'';const cliente=r[6]||'';
        const destino=r[7]||'';const persona=r[8]||'';const comment=r[9]||'';
        const fechaFin=r[3]||'';
        if(!buque) return;
        const registroId = getRegistroId(r, 'buques');
        const rowClass = fechaFin ? 'finalizado' : '';
        const onclick = fechaFin ? `onclick="toggleFinalized('${registroId}', 'buques')"` : '';
        const title = fechaFin ? 'Haz clic para ocultarlo (2 horas de finalizado)' : '';
        html+=`<tr class="${rowClass}" title="${title}" ${onclick}>
          <td class="cell-main">${buque}</td>
          <td class="cell-sec">${eta}</td>
          <td class="cell-sec">${etb}</td>
          <td class="cell-sec">${etc}</td>
          <td><span style="font-size:11px;font-weight:600;color:var(--accent)">${carga}</span></td>
          <td class="cell-num">${vol}</td>
          <td class="cell-sec">${cliente}</td>
          <td class="cell-muted">${destino}</td>
          <td class="cell-muted">${persona}</td>
          <td class="cell-comment">${comment}</td>
        </tr>`;
      });
      html+=`</tbody></table>`;
    }
    html+=`</div>`;
  });
  document.getElementById('loading-buques').style.display='none';
  const cont=document.getElementById('content-buques');
  cont.style.display='block';
  cont.innerHTML=html;
  document.getElementById('cnt-buques').textContent=totalBuques;
  const updB=document.getElementById('upd-b');
  if(updB) updB.textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  updateFinalizadoCount();
}

async function loadAll(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spin');
  try {
    const [rb, rf] = await Promise.all([
      fetch(csvUrl(GID_BUQUES)).then(r=>r.text()),
      fetch(csvUrl(GID_FLUVIAL)).then(r=>r.text())
    ]);
    rawBuques  = parseBuques(parseSheet(rb));
    rawFluvial = parseFluvial(parseSheet(rf));
    renderBuques(rawBuques);
    renderFluvial(rawFluvial);
    const t=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-upd').textContent='Actualizado '+t;
  } catch(e) {
    console.error('Error:', e);
    ['buques','fluvial'].forEach(tab=>{
      document.getElementById('loading-'+tab).style.display='none';
      document.getElementById('content-'+tab).style.display='block';
      document.getElementById('content-'+tab).innerHTML=`<div class="error-state">Error al cargar los datos. Verifica los permisos del Sheet.</div>`;
    });
  }
  btn.classList.remove('spin');
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('pane-'+tab).classList.add('active');
}

function applySearch(){
  const s=document.getElementById('search').value;
  renderBuques(rawBuques, s);
  renderFluvial(rawFluvial, s);
}

loadAll();
setInterval(loadAll, 5*60*1000);
setInterval(() => {
  renderBuques(rawBuques);
  renderFluvial(rawFluvial);
}, 60*1000);
</script>
